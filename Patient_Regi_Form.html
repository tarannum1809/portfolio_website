<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Latest compiled JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
 
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    
</head>
<body>
     <div class="container">
        <div class="row mt-4 justify-content-center">
      <div class="col-lg-10 col-md-11 col-12 shadow p-4 border rounded mx-auto">
                <h3 class="text-center">Patient Registration Form</h3>
                <p>Please fill in your details to register as a new patient.</p>
                <form action="">
                   <div class="row">
                   
                    <div class="col-lg-6">
                     <div class=" mb-3">
                        <label for=""><b>First Name</b></label>
      <input type="text" name="" class="form-control" placeholder="Enter your first name">
                   </div>
                   </div>

                    <div class="col-lg-6">
                     <div class=" mb-3">
                        <label for=""><b>Last Name</b></label>
    <input type="text" name="" class="form-control" placeholder="Enter your last name">
                   </div>
                   </div>

                     <div class="col-lg-12">
                     <div class=" mb-3">
                        <label for=""><b>Date of Birth</b></label>
      <input type="date" name="" class="form-control" placeholder="Enter your last name">
                   </div>
                   </div>

                   
                     <div class="col-lg-12">
                     <div class=" mb-3">
                        <label for=""><b>Gender</b></label>
                        <input type="radio" name="">Male
                         <input type="radio" name="">Female
                          <input type="radio" name="">Other
                   </div>
                   </div>

                    <div class="col-lg-12">
                     <div class=" mb-3">
                        <label for=""><b>Email Address</b></label>
      <input type="email" name="" class="form-control" placeholder="Enter your email">
                   </div>
                   </div>

                   
                    <div class="col-lg-12">
                     <div class=" mb-3">
                        <label for=""><b>Phone Number</b></label>
      <input type="number" name="" class="form-control" placeholder="+1 (555) 123-4567">
                   </div>
                   </div>

                   
                    <div class="col-lg-12">
                     <div class=" mb-3">
                        <label for=""><b>Address</b></label>
         <textarea class="form-control" placeholder="Enter your address here"></textarea>
                    
                   </div>
                   </div>

                 
                    <div class="col-lg-12">
                     <div class=" mb-3">
                        <label for=""><b>Emergency Contact Number</b></label>
       <input type="number" name="" class="form-control" placeholder="+1 (555) 987-6543">
                   </div>
                   </div>

                    
                    <div class="col-lg-12">
                     <div class=" mb-3">
                         <input type="checkbox" name="">
                         <label for="">I consent to the processing of my personal
                            data in accordance with the privacy policy.</label>
                       
                   </div>
                   </div>

                   <div><center>
             <input type="submit" value="Register" class="btn btn-primary "></center>
                   </div>
                </label>
                </div>
            </div>
            </div>
</body>
</html>
